<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1100" width="100%" height="100%">
  <defs>
    <!-- Dynamic Tech Gradients -->
    <linearGradient id="bracketGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="rocketBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="jetFlame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>

    <!-- UI/UX Typography Styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800&amp;display=swap');
      .brand-contrib {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 800;
        font-size: 82px;
        fill: #10B981;
        letter-spacing: -2px;
      }
      .brand-start {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 800;
        font-size: 82px;
        fill: #2563EB;
        letter-spacing: -2px;
      }
      .brand-tagline {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 400;
        font-size: 26px;
        fill: #94A3B8;
        letter-spacing: 6px;
      }
    </style>
  </defs>

  <!-- ==================== LOGO ICON (TOP) ==================== -->
  <g transform="translate(50, 50)">
    <!-- Premium Dark Minimalist Badge Base -->
    <circle cx="450" cy="450" r="410" fill="#0A0E17" />
    <circle cx="450" cy="450" r="408" fill="none" stroke="#1E293B" stroke-width="4" />

    <!-- Outer Layer: Code Brackets Framing the Space -->
    <!-- Left Bracket (<) -->
    <path d="M 280,260 
             L 150,390 
             C 130,410 130,444 150,464 
             L 280,594" 
          fill="none" 
          stroke="url(#bracketGreen)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
      
    <!-- Right Bracket (>) -->
    <path d="M 620,260 
             L 750,390 
             C 770,410 770,444 750,464 
             L 620,594" 
          fill="none" 
          stroke="url(#rocketBlue)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Jet Propulsion -->
    <path d="M 420,640 
             C 395,715 450,810 450,810 
             C 450,810 505,715 480,640" 
          fill="url(#jetFlame)" />
            
    <path d="M 435,640 
             C 420,685 450,740 450,740 
             C 450,740 480,685 465,640" 
          fill="#FFF1F2" />

    <!-- Inner Layer: Geometric Rocket Flight Core -->
    <!-- Wings/Stabilizers -->
    <path d="M 330,550 L 300,590 L 360,590 L 380,540 Z" fill="#059669" />
    <path d="M 570,550 L 600,590 L 540,590 L 520,540 Z" fill="#1D4ED8" />

    <!-- Main Fuselage Core -->
    <path d="M 450,90 
             L 530,360 
             L 500,590 
             L 450,550 
             L 400,590 
             L 370,360 Z" 
          fill="#FFFFFF" />

    <!-- Technical Facet Split -->
    <path d="M 450,90 L 450,550 L 400,590 L 370,360 Z" fill="#E2E8F0" opacity="0.4" />

    <!-- Minimal Modern HUD Crosshair/Targeting Ring -->
    <circle cx="450" cy="300" r="45" fill="none" stroke="url(#rocketBlue)" stroke-width="6" stroke-dasharray="16 12" />
    <circle cx="450" cy="300" r="12" fill="url(#bracketGreen)" />
  </g>

  <!-- ==================== TYPOGRAPHY (BOTTOM) ==================== -->
  <g transform="translate(500, 980)">
    <!-- Centered Name Wordmark -->
    <text text-anchor="middle" x="0" y="0">
      <tspan class="brand-contrib">Contrib</tspan><tspan class="brand-start">Start</tspan>
    </text>
    
    <!-- Centered Tagline -->
    <text text-anchor="middle" x="0" y="55" class="brand-tagline">LAUNCH YOUR OPEN-SOURCE JOURNEY</text>
  </g>
</svg>
